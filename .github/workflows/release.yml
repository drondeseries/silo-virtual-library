name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Test
        run: go test ./...
      - name: Build plugin
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          GOWORK: off
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/plugin-${GOOS}-${GOARCH}" .
      - uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/plugin-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare assets and checksums
        run: |
          mkdir release
          find artifacts -type f -name 'plugin-*' -exec cp {} release/ \;
          cd release
          sha256sum plugin-* > checksums.txt
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/plugin-linux-amd64
            release/plugin-linux-arm64
            release/plugin-darwin-arm64
            release/checksums.txt
